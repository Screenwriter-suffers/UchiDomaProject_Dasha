  <style>
    body {
      background-image: 
                    linear-gradient(rgba(255, 255, 255, 0.897), rgba(145, 145, 145, 0.5)),
                    url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTDw6qtw-idq0Y2dQ9_WlkA6YPh3FsQSpIc3g&s');
                    
      background-size:  cover, 100% 100%;
      background-repeat: no-repeat, no-repeat;
      background-attachment: fixed, fixed;
      background-position: center center, center center;
    }

    #gif-overlay {
      position: fixed;
      top: 10; left: 10; width: 100%; height: 100%;
      z-index: 1; 
      background-image: url('https://media1.tenor.com/m/-YlzaY7PXb4AAAAd/among-us-amogus.gif');
      background-size: cover;
      background-position: center;
      opacity: 0; 
      pointer-events: none;
    }


    @keyframes fadeInOut {
      0% { opacity: 0; }
      20% { opacity: 0; } 
      80% { opacity: 0.1; } 
      100% { opacity: 0; }  
    }

    .animate-gif {
      animation: fadeInOut 3s ease-in-out forwards;
    }
  </style>
</head>

  <script>
    function playRandomMeow() {
        const total = 26; // Укажи сколько у тебя файлов m_
        const randomNum = Math.floor(Math.random() * total) + 1;
        const sound = document.getElementById('meow_' + randomNum);
        if (sound) {
            sound.currentTime = 0;
            sound.play();
        }
    }

    function highlightMeows() {
        const wordToFind = "Мяу";
        const regex = new RegExp(`(${wordToFind})`, 'gi');
        
        // Ищем во всех текстовых элементах: заголовки, параграфы, ссылки, карточки
        const elements = document.querySelectorAll('p, h1, h2, h5, .card-title, .nav-link, a');

        elements.forEach(el => {
            // Проверяем, нет ли внутри уже других тегов, чтобы не сломать верстку
            if (el.children.length === 0 && el.innerText.includes(wordToFind)) {
                el.innerHTML = el.innerHTML.replace(regex, 
                    `<span onclick="playRandomMeow()" style="cursor: pointer; font-weight: bold;">$1</span>`
                );
            }
        });
    }

    // Запускаем при загрузке каждой страницы
    window.addEventListener('DOMContentLoaded', highlightMeows);
</script>
